# AI Provider and Model Configuration
# Maps roles to ordered provider chains for the Model Router.
#
# NOTE: Only 'openrouter' is currently implemented as an adapter.
# Until OpenAI/Anthropic adapters exist and are registered in the capability
# registry, only openrouter entries will resolve successfully.

roles:
  clarification:
    chain:
      - provider: openrouter
        model: nvidia/nemotron-3-ultra-550b-a55b:free

  architect:
    chain:
      - provider: openrouter
        model: nvidia/nemotron-3-ultra-550b-a55b:free

  planner:
    chain:
      - provider: openrouter
        model: nvidia/nemotron-3-ultra-550b-a55b:free

  coder:
    chain:
      - provider: openrouter
        model: nvidia/nemotron-3-ultra-550b-a55b:free

  reviewer:
    chain:
      - provider: openrouter
        model: nvidia/nemotron-3-ultra-550b-a55b:free

  doc_writer:
    chain:
      - provider: openrouter
        model: nvidia/nemotron-3-ultra-550b-a55b:free

  interrupt_handler:
    chain:
      - provider: openrouter
        model: nvidia/nemotron-3-ultra-550b-a55b:free

# Provider configurations (for future adapters)
