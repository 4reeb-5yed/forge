# AI Provider and Model Configuration
# Maps roles to ordered provider chains for the Model Router.

roles:
  clarification:
    chain:
      - provider: openrouter
        model: nvidia/nemotron-3-ultra-550b-a55b:free

  architect:
    chain:
      - provider: openrouter
        model: nvidia/nemotron-3-ultra-550b-a55b:free

  planner:
    chain:
      - provider: openrouter
        model: nvidia/nemotron-3-ultra-550b-a55b:free

  coder:
    chain:
      - provider: openrouter
        model: nvidia/nemotron-3-ultra-550b-a55b:free

  reviewer:
    chain:
      - provider: openrouter
        model: nvidia/nemotron-3-ultra-550b-a55b:free

  doc_writer:
    chain:
      - provider: openrouter
        model: nvidia/nemotron-3-ultra-550b-a55b:free

  interrupt_handler:
    chain:
      - provider: openrouter
        model: nvidia/nemotron-3-ultra-550b-a55b:free

providers:
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    timeout_s: 120
