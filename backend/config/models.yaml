# AI Provider and Model Configuration
# Maps roles to ordered provider chains for the Model Router.

roles:
  clarification:
    chain:
      - provider: openrouter
        model: anthropic/claude-3-haiku

  architect:
    chain:
      - provider: openrouter
        model: anthropic/claude-3-haiku

  planner:
    chain:
      - provider: openrouter
        model: anthropic/claude-3-haiku

  coder:
    chain:
      - provider: openrouter
        model: anthropic/claude-3-haiku

  reviewer:
    chain:
      - provider: openrouter
        model: anthropic/claude-3-haiku

  doc_writer:
    chain:
      - provider: openrouter
        model: anthropic/claude-3-haiku

  interrupt_handler:
    chain:
      - provider: openrouter
        model: anthropic/claude-3-haiku

providers:
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
    timeout_s: 120
