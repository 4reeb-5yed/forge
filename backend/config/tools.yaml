# Coding Tool Configuration
# Defines available coding tools and their settings.

tools:
  aider:
    enabled: true
    command: "aider"
    args:
      - "--no-auto-commits"
      - "--yes"
    timeout_s: 300
    # Working directory is set per-workspace at runtime
    env:
      AIDER_MODEL: "${AIDER_MODEL}"

  # OpenHands stub - deferred to post-MVP (see design doc I.3)
  openhands:
    enabled: false
    command: "openhands"
    timeout_s: 600
