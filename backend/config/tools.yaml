# Coding Tool Configuration
# Defines available coding tools and their settings.

tools:
  aider:
    enabled: true
    command: "aider"
    args:
      - "--no-auto-commits"
      - "--yes"
    timeout_s: 300
    # Working directory is set per-workspace at runtime
    env:
      AIDER_MODEL: "${AIDER_MODEL}"

  # OpenHands is implemented in app/adapters/openhands.py and used automatically
  # when OPENHANDS_API_KEY is set — see bootstrap.py _create_coding_tool() (highest
  # priority coding tool, checked before Sandboxed Aider and direct Aider).
  # This tools.yaml entry is currently unused since probe-based discovery
  # (run_discovery) is skipped at boot by bootstrap.py.
  openhands:
    enabled: true
    command: "openhands"
    timeout_s: 600
